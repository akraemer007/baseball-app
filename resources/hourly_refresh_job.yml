resources:
  jobs:
    ak_baseball_hourly_refresh:
      name: "[${bundle.target}] ak_baseball — hourly refresh"
      schedule:
        # Hourly at :00 from 12pm ET through midnight ET (final run at
        # 00:00 ET). Recap generation runs at the end of each hourly
        # chain in mode=all-missing, picking up any Final game that
        # doesn't yet have a recap. West Coast finishes (~1 AM ET) get
        # recapped within an hour by the next scheduled run; the old
        # ak_baseball_morning_recaps job is retired.
        quartz_cron_expression: "0 0 0,12-23 * * ?"
        timezone_id: "America/New_York"
        pause_status: "UNPAUSED"
      max_concurrent_runs: 1
      parameters:
        # Recap parameters mirror the old morning_recaps_job for manual
        # reruns. Default mode=recent (last 3 days) NOT all-missing —
        # all-missing tries to recap every un-recapped game in history,
        # which is thousands of LLM calls after the multi-year backfill.
        # `recent` covers today's mid-day finalizers plus a buffer for
        # late West Coast finishes.
        - name: recap_mode
          default: "recent"
        - name: recap_force
          default: "false"
        - name: recap_target_date
          default: ""
        - name: recap_recent_days
          default: "3"
        # Storyline parameters — generate_storylines runs after
        # generate_recaps. Default empty target_date → "yesterday in
        # America/New_York" inside the script.
        - name: storyline_force
          default: "false"
        - name: storyline_target_date
          default: ""
        - name: storyline_only_teams
          default: ""
      tasks:
        - task_key: ingest_schedule_and_games
          notebook_task:
            notebook_path: ../jobs/ingest/fetch_games.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              mode: "daily"
          environment_key: default_env

        - task_key: refine_silver
          depends_on:
            - task_key: ingest_schedule_and_games
          notebook_task:
            notebook_path: ../jobs/refine/silver_transforms.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
          environment_key: default_env

        - task_key: ingest_playbyplay
          # Calls MLB Stats API schedule endpoint directly to discover
          # Final game_pks — no dep on bronze_schedule or silver_game.
          # Runs from zero, fully parallel to ingest_schedule_and_games
          # and refine_silver.
          notebook_task:
            notebook_path: ../jobs/ingest/fetch_playbyplay.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
          environment_key: default_env

        - task_key: refine_silver_playbyplay
          depends_on:
            - task_key: ingest_playbyplay
          notebook_task:
            notebook_path: ../jobs/refine/silver_playbyplay.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
          environment_key: default_env

        - task_key: ingest_statcast
          # Statcast pulls Savant CSV by date range; no warehouse reads.
          # Runs from zero, fully parallel to all other ingests.
          notebook_task:
            notebook_path: ../jobs/ingest/fetch_statcast.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
          environment_key: default_env

        - task_key: refine_silver_statcast
          depends_on:
            - task_key: ingest_statcast
          notebook_task:
            notebook_path: ../jobs/refine/silver_statcast.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
          environment_key: default_env

        - task_key: ingest_transactions
          # Transactions pulls MLB Stats API by date range; no
          # warehouse reads. Runs from zero, fully parallel.
          notebook_task:
            notebook_path: ../jobs/ingest/fetch_transactions.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
          environment_key: default_env

        - task_key: refine_silver_transactions
          depends_on:
            - task_key: ingest_transactions
          notebook_task:
            notebook_path: ../jobs/refine/silver_transactions.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
          environment_key: default_env

        - task_key: build_gold
          depends_on:
            - task_key: refine_silver
            - task_key: refine_silver_playbyplay
            - task_key: refine_silver_statcast
            - task_key: refine_silver_transactions
          sql_task:
            warehouse_id: ${var.warehouse_id}
            file:
              path: ../jobs/gold/build_gold.sql
            parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}

        - task_key: compute_elo
          depends_on:
            - task_key: build_gold
          notebook_task:
            notebook_path: ../jobs/elo/compute_elo.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
          environment_key: default_env

        - task_key: generate_recaps
          # Hourly recap pass: catches any Final game that doesn't yet
          # have a recap. The script's NOT-EXISTS gating means re-runs
          # are no-ops on fully-recapped days. LLM cost is unchanged
          # vs the old morning-only model — same total recaps, just
          # spread across hours.
          depends_on:
            - task_key: compute_elo
          notebook_task:
            notebook_path: ../jobs/recaps/generate_recaps.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              endpoint: ${var.foundation_model_endpoint}
              mode: "{{job.parameters.recap_mode}}"
              force: "{{job.parameters.recap_force}}"
              target_date: "{{job.parameters.recap_target_date}}"
              recent_days: "{{job.parameters.recap_recent_days}}"
          environment_key: default_env

        - task_key: generate_storylines
          # Daily team storylines (DERIV-11). NOT-EXISTS gated on
          # (team_id, generated_for_date) so most hourly runs are
          # no-ops; the first run after midnight ET writes the day's
          # rows. Cost target: ~$1/month at 30 teams × 1 day.
          depends_on:
            - task_key: generate_recaps
          notebook_task:
            notebook_path: ../jobs/storylines/generate_storylines.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              endpoint: ${var.foundation_model_endpoint}
              force: "{{job.parameters.storyline_force}}"
              target_date: "{{job.parameters.storyline_target_date}}"
              only_teams: "{{job.parameters.storyline_only_teams}}"
          environment_key: default_env

      environments:
        - environment_key: default_env
          spec:
            client: "2"
            dependencies:
              - requests>=2.32
