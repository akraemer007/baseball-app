resources:
  jobs:
    ak_baseball_hourly_refresh:
      name: "[${bundle.target}] ak_baseball — hourly refresh (projections)"
      schedule:
        # Hourly at :00 from 12pm ET through 4am ET next day.
        # Covers afternoon games through ~1 hour past typical West Coast finish.
        # Recap generation lives in ak_baseball_morning_recaps instead.
        quartz_cron_expression: "0 0 0-4,12-23 * * ?"
        timezone_id: "America/New_York"
        pause_status: "UNPAUSED"
      max_concurrent_runs: 1
      tasks:
        - task_key: ingest_schedule_and_games
          notebook_task:
            notebook_path: ../jobs/ingest/fetch_games.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              mode: "daily"
          environment_key: default_env

        - task_key: refine_silver
          depends_on:
            - task_key: ingest_schedule_and_games
          notebook_task:
            notebook_path: ../jobs/refine/silver_transforms.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
          environment_key: default_env

        - task_key: build_gold
          depends_on:
            - task_key: refine_silver
          sql_task:
            warehouse_id: ${var.warehouse_id}
            file:
              path: ../jobs/gold/build_gold.sql
            parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}

        - task_key: compute_elo
          depends_on:
            - task_key: build_gold
          notebook_task:
            notebook_path: ../jobs/elo/compute_elo.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
          environment_key: default_env

      environments:
        - environment_key: default_env
          spec:
            client: "2"
            dependencies:
              - requests>=2.32
