resources:
  jobs:
    ak_baseball_morning_recaps:
      name: "[${bundle.target}] ak_baseball — morning recaps"
      schedule:
        # 05:00 ET daily — 1 hour after the last hourly refresh. The full
        # chain runs again so any West Coast game that went Final between
        # 04:00 and 05:00 ET is captured before recap generation fires.
        quartz_cron_expression: "0 0 5 * * ?"
        timezone_id: "America/New_York"
        pause_status: "UNPAUSED"
      max_concurrent_runs: 1
      parameters:
        - name: recap_mode
          default: "yesterday"
        - name: recap_force
          default: "false"
        - name: recap_target_date
          default: ""
      tasks:
        - task_key: ingest_schedule_and_games
          notebook_task:
            notebook_path: ../jobs/ingest/fetch_games.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              mode: "daily"
          environment_key: default_env

        - task_key: refine_silver
          depends_on:
            - task_key: ingest_schedule_and_games
          notebook_task:
            notebook_path: ../jobs/refine/silver_transforms.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
          environment_key: default_env

        - task_key: build_gold
          depends_on:
            - task_key: refine_silver
          sql_task:
            warehouse_id: ${var.warehouse_id}
            file:
              path: ../jobs/gold/build_gold.sql
            parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}

        - task_key: compute_elo
          depends_on:
            - task_key: build_gold
          notebook_task:
            notebook_path: ../jobs/elo/compute_elo.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
          environment_key: default_env

        - task_key: generate_recaps
          depends_on:
            - task_key: compute_elo
          notebook_task:
            notebook_path: ../jobs/recaps/generate_recaps.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              endpoint: ${var.foundation_model_endpoint}
              mode: "{{job.parameters.recap_mode}}"
              force: "{{job.parameters.recap_force}}"
              target_date: "{{job.parameters.recap_target_date}}"
          environment_key: default_env

      environments:
        - environment_key: default_env
          spec:
            client: "2"
            dependencies:
              - requests>=2.32
